<svg width="860" height="180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#08102a"/>
      <stop offset="100%" stop-color="#050a18"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#00f2fe"/>
    </marker>
  </defs>
  <rect width="860" height="180" rx="10" fill="url(#ag)" stroke="#0d1f3c" stroke-width="1"/>
  <!-- SpaceEngine -->
  <rect x="20"  y="65" width="130" height="50" rx="6" fill="#0a1628" stroke="#00f2fe" stroke-width="1.5"/>
  <text x="85"  y="86"  font-family="'Segoe UI',sans-serif" font-size="11" fill="#00ffff" text-anchor="middle" font-weight="bold">SpaceEngine</text>
  <text x="85"  y="102" font-family="'Segoe UI',sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Raw .sc Files</text>
  <!-- Harvester -->
  <rect x="200" y="65" width="130" height="50" rx="6" fill="#0a1628" stroke="#10b981" stroke-width="1.5"/>
  <text x="265" y="86"  font-family="'Segoe UI',sans-serif" font-size="11" fill="#10b981" text-anchor="middle" font-weight="bold">Cosmic Harvester</text>
  <text x="265" y="102" font-family="'Segoe UI',sans-serif" font-size="10" fill="#64748b" text-anchor="middle">SQLite WAL</text>
  <!-- Scenario Engine -->
  <rect x="380" y="65" width="130" height="50" rx="6" fill="#0a1628" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="445" y="86"  font-family="'Segoe UI',sans-serif" font-size="11" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Scenario Engine</text>
  <text x="445" y="102" font-family="'Segoe UI',sans-serif" font-size="10" fill="#64748b" text-anchor="middle">JSONL Datasets</text>
  <!-- Stellar Intel -->
  <rect x="560" y="65" width="130" height="50" rx="6" fill="#0a1628" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="625" y="86"  font-family="'Segoe UI',sans-serif" font-size="11" fill="#0ea5e9" text-anchor="middle" font-weight="bold">Stellar Intel</text>
  <text x="625" y="102" font-family="'Segoe UI',sans-serif" font-size="10" fill="#64748b" text-anchor="middle">PyTorch + XAI</text>
  <!-- Catalog GUI -->
  <rect x="740" y="65" width="100" height="50" rx="6" fill="#0a1628" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="790" y="86"  font-family="'Segoe UI',sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">Catalog GUI</text>
  <text x="790" y="102" font-family="'Segoe UI',sans-serif" font-size="10" fill="#64748b" text-anchor="middle">PyQt6 LRU</text>
  <!-- arrows -->
  <line x1="150" y1="90" x2="198" y2="90" stroke="#00f2fe" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="330" y1="90" x2="378" y2="90" stroke="#00f2fe" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="510" y1="90" x2="558" y2="90" stroke="#00f2fe" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="690" y1="90" x2="738" y2="90" stroke="#00f2fe" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- labels -->
  <text x="430" y="155" font-family="'Courier New',monospace" font-size="11" fill="#475569" text-anchor="middle">
    PIPELINE  ──  Zero-Loss  ·  Async I/O  ·  K-Fold CV  ·  Explainable AI  
  </text>
</svg>